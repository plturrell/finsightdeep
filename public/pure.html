<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIQ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
            background: #ffffff;
            color: #1d1d1f;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .stage {
            width: 100%;
            max-width: 600px;
            padding: 0 32px;
            text-align: center;
        }

        .input-field {
            width: 100%;
            height: 48px;
            background: none;
            border: none;
            font-size: 17px;
            font-weight: 400;
            color: #1d1d1f;
            text-align: center;
            outline: none;
            border-radius: 24px;
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            z-index: 2;
        }

        .input-field::placeholder {
            color: #86868b;
            font-weight: 400;
        }

        .input-field:focus {
            background: rgba(0, 0, 0, 0.02);
        }

        .input-container {
            position: relative;
            border: 1px solid transparent;
            border-radius: 24px;
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            background: rgba(0, 0, 0, 0.02);
            backdrop-filter: blur(20px);
        }

        .input-container:focus-within {
            border-color: rgba(0, 0, 0, 0.1);
            background: rgba(0, 0, 0, 0.03);
            transform: scale(1.005);
        }

        .submit-button {
            position: absolute;
            right: 4px;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            border: none;
            background: #007aff;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            opacity: 0;
            scale: 0.8;
        }

        .submit-button.visible {
            opacity: 1;
            scale: 1;
        }

        .submit-button:hover {
            background: #0056d0;
            scale: 1.05;
        }

        .submit-button:active {
            scale: 0.95;
        }

        .submit-button svg {
            width: 16px;
            height: 16px;
            fill: white;
        }

        .response-area {
            margin-top: 40px;
            min-height: 200px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .response-area.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .response-text {
            font-size: 17px;
            line-height: 1.5;
            color: #1d1d1f;
            text-align: left;
            font-weight: 400;
            max-width: 100%;
            word-wrap: break-word;
        }

        .thinking-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin: 40px 0;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .thinking-indicator.visible {
            opacity: 1;
        }

        .thinking-dot {
            width: 4px;
            height: 4px;
            background: #86868b;
            border-radius: 50%;
            animation: thinking 1.4s infinite ease-in-out;
        }

        .thinking-dot:nth-child(1) { animation-delay: -0.32s; }
        .thinking-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes thinking {
            0%, 80%, 100% {
                transform: scale(0.8);
                opacity: 0.5;
            }
            40% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        .status-indicator {
            position: fixed;
            top: 32px;
            right: 32px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #86868b;
            transition: all 0.2s ease;
        }

        .status-indicator.connected {
            background: #30d158;
        }

        @media (max-width: 768px) {
            .stage {
                padding: 0 24px;
            }
            
            .status-indicator {
                top: 24px;
                right: 24px;
            }
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: #000000;
                color: #f5f5f7;
            }

            .input-field {
                color: #f5f5f7;
            }

            .input-field::placeholder {
                color: #86868b;
            }

            .input-container {
                background: rgba(255, 255, 255, 0.05);
            }

            .input-container:focus-within {
                border-color: rgba(255, 255, 255, 0.2);
                background: rgba(255, 255, 255, 0.08);
            }

            .response-text {
                color: #f5f5f7;
            }

            .thinking-dot {
                background: #86868b;
            }
        }
    </style>
</head>
<body>
    <div class="status-indicator" id="statusIndicator"></div>
    
    <div class="stage">
        <div class="input-container">
            <input 
                type="text" 
                class="input-field" 
                placeholder="Ask me anything"
                id="promptInput"
                autocomplete="off"
                spellcheck="false"
            >
            <button class="submit-button" id="submitButton">
                <svg viewBox="0 0 24 24">
                    <path d="M2,21L23,12L2,3V10L17,12L2,14V21Z"/>
                </svg>
            </button>
        </div>
        
        <div class="thinking-indicator" id="thinkingIndicator">
            <div class="thinking-dot"></div>
            <div class="thinking-dot"></div>
            <div class="thinking-dot"></div>
        </div>
        
        <div class="response-area" id="responseArea">
            <div class="response-text" id="responseText"></div>
        </div>
    </div>

    <script>
        class PureAI {
            constructor() {
                this.elements = {
                    input: document.getElementById('promptInput'),
                    submitButton: document.getElementById('submitButton'),
                    thinkingIndicator: document.getElementById('thinkingIndicator'),
                    responseArea: document.getElementById('responseArea'),
                    responseText: document.getElementById('responseText'),
                    statusIndicator: document.getElementById('statusIndicator')
                };
                
                this.config = {
                    backendUrl: window.location.origin
                };
                
                this.init();
            }

            init() {
                this.bindEvents();
                this.checkConnection();
            }

            bindEvents() {
                this.elements.input.addEventListener('input', () => {
                    const hasText = this.elements.input.value.trim().length > 0;
                    this.elements.submitButton.classList.toggle('visible', hasText);
                });

                this.elements.input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && this.elements.input.value.trim()) {
                        e.preventDefault();
                        this.submit();
                    }
                });

                this.elements.submitButton.addEventListener('click', () => {
                    this.submit();
                });
            }

            async checkConnection() {
                try {
                    const response = await fetch(`${this.config.backendUrl}/api/health`);
                    this.elements.statusIndicator.classList.toggle('connected', response.ok);
                } catch {
                    this.elements.statusIndicator.classList.remove('connected');
                }
            }

            async submit() {
                const prompt = this.elements.input.value.trim();
                if (!prompt) return;

                this.showThinking(true);
                this.hideResponse();

                try {
                    const response = await fetch(`${this.config.backendUrl}/api/generate`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            prompt,
                            model: 'nvidia-ai',
                            nvidia_endpoint: 'https://jupyter0-s1ondnjfx.brevlab.com'
                        })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        this.showResponse(data.response || data.message || 'Response received.');
                    } else {
                        this.showResponse('I encountered an issue. Please try again.');
                    }
                } catch {
                    this.showResponse('Unable to connect. Please check your connection.');
                } finally {
                    this.showThinking(false);
                }
            }

            showThinking(show) {
                this.elements.thinkingIndicator.classList.toggle('visible', show);
            }

            hideResponse() {
                this.elements.responseArea.classList.remove('visible');
            }

            showResponse(text) {
                this.elements.responseText.textContent = text;
                setTimeout(() => {
                    this.elements.responseArea.classList.add('visible');
                }, 50);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new PureAI();
        });
    </script>
</body>
</html>
